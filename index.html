<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ZenithPass Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6fb;
}

/* ===== HEADER ===== */
.header {
  background: #2f4fa3;
  color: white;
  padding: 15px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.header-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-logos {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  height: 50px;
  object-fit: contain;
}

.header-title {
  text-align: center;
  flex: 1;
}

.header-title h1 {
  margin: 0;
  font-size: 28px;
}

.header-title p {
  margin: 3px 0 0 0;
  font-size: 14px;
  opacity: 0.9;
}

/* ===== CONTENIDO ===== */
.container {
  padding: 20px;
}

/* ===== TARJETAS ===== */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  min-width: 200px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #555;
}

.card p {
  font-size: 28px;
  margin: 10px 0 0 0;
  font-weight: bold;
}

/* ===== BARRAS ===== */
.bar-container {
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.bar {
  height: 15px;
  background: #ddd;
  border-radius: 10px;
  margin: 10px 0;
}

.bar-fill {
  height: 100%;
  background: #2f4fa3;
  border-radius: 10px;
}

/* ===== TABLA ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

th {
  background: #2f4fa3;
  color: white;
}

button {
  margin-top: 20px;
  padding: 10px 15px;
  background: #2f4fa3;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-container">

    <!-- IZQUIERDA -->
    <div class="header-logos">
      <img src="tecnm.png" class="logo">
      <img src="itesi.png" class="logo">
    </div>

    <!-- CENTRO -->
    <div class="header-title">
      <h1>ZenithPass Dashboard</h1>
      <p>Centro de monitoreo de accesos y flujo de visitantes</p>
    </div>

    <!-- DERECHA -->
    <div class="header-logos">
      <img src="innovatec.png" class="logo">
      <img src="cerbero.png" class="logo">
    </div>

  </div>
</header>

<!-- ===== CONTENIDO ===== -->
<div class="container">

<button onclick="cargarDatos()">Actualizar datos</button>

<div class="cards">
  <div class="card">
    <h3>Total de registros</h3>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h3>Acceso A</h3>
    <p id="a">0</p>
  </div>

  <div class="card">
    <h3>Acceso B</h3>
    <p id="b">0</p>
  </div>

  <div class="card">
    <h3>Acceso C</h3>
    <p id="c">0</p>
  </div>
</div>

<div class="bar-container">
  <h3>Conteo por tipo</h3>
  <div id="tipos"></div>
</div>

<h3>Últimos movimientos</h3>
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>Acceso</th>
<th>Zona</th>
<th>Tipo</th>
<th>Confianza</th>
<th>Dispositivo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

/* ===== CONFIG FIREBASE ===== */
var firebaseConfig = {
  apiKey: "TU_API_KEY",
  databaseURL: "https://in-26-v1-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

/* ===== FORMATEO ===== */
function formatearHora(hora) {
  if (!hora) return "";
  return hora.slice(0,2)+":"+hora.slice(2,4)+":"+hora.slice(4,6);
}

function formatearFecha(fecha) {
  if (!fecha) return "";
  let p = fecha.split("-");
  return p[2]+"-"+p[1]+"-"+p[0];
}

/* ===== CARGAR DATOS ===== */
function cargarDatos() {

  firebase.database().ref("accesos").once("value", function(snapshot){

    let total=0, a=0, b=0, c=0;
    let tipos = {};
    let registros = [];

    snapshot.forEach(nivel1 => {
      nivel1.forEach(fecha => {
        fecha.forEach(reg => {

          let d = reg.val();
          total++;

          if(d.acceso=="A") a++;
          if(d.acceso=="B") b++;
          if(d.acceso=="C") c++;

          tipos[d.tipo] = (tipos[d.tipo]||0)+1;

          registros.push(d);

        });
      });
    });

    document.getElementById("total").innerText = total;
    document.getElementById("a").innerText = a;
    document.getElementById("b").innerText = b;
    document.getElementById("c").innerText = c;

    /* BARRAS */
    let html="";
    for(let t in tipos){
      html += `<div>${t} (${tipos[t]})</div>
               <div class="bar">
               <div class="bar-fill" style="width:${tipos[t]*10}px"></div>
               </div>`;
    }
    document.getElementById("tipos").innerHTML = html;

    /* TABLA */
    registros.sort((x,y)=> y.hora - x.hora);

    let tabla="";
    registros.slice(0,10).forEach(r=>{
      tabla += `<tr>
        <td>${formatearFecha(r.fecha)}</td>
        <td>${formatearHora(r.hora)}</td>
        <td>${r.acceso}</td>
        <td>${r.zona}</td>
        <td>${r.tipo}</td>
        <td>${r.confianza}</td>
        <td>${r.dispositivo}</td>
      </tr>`;
    });

    document.getElementById("tabla").innerHTML = tabla;

  });

}

/* AUTOLOAD */
cargarDatos();

</script>

</body>
</html>
